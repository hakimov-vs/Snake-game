<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake game</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="container">
        <canvas id="canvas"></canvas>
        <div>
            <div id="foodInfo">
                <div>
                    <h1 style="margin-left: 5px;">Food points: </h1>
                </div>
                <div class="food-item">
                    <img src="assets/apple.png" alt="apple">
                    <span>Apple (+1)</span>
                </div>

                <div class="food-item">
                    <img src="assets/carrot.png" alt="carrot">
                    <span>Carrot (+1)</span>
                </div>

                <div class="food-item">
                    <img src="assets/banana.png" alt="banana">
                    <span>Banana (+2)</span>
                </div>

                <div class="food-item">
                    <img src="assets/watermelon.png" alt="watermelon">
                    <span>Watermelon (+2)</span>
                </div>
            </div>
            <div id="controls">
                <div style="display: inline-block; padding: 0;">
                    <h1 style="margin-left: 5px;">Control: </h1>
                </div>
                <label>
                    Speed:
                    <input type="range" id="speedControl" min="50" max="500" value="200" step="10">
                    <span id="speedValue">200</span> 
                </label>
            </div>
            <div style="display: inline-block; padding: 0;">
                <h1 style="margin: 10px 5px;">Levels: </h1>
            </div>
            <label>
                <select id="levels">
                    <option value="Level1">Level one (eaisy no wall)</option>
                    <option value="Level2">Level two (medium with walls)</option>
                    <option value="Level3">Level three (medium with walls)</option>
                </select>
            </label>
            <div>
                <button id="restart" style="margin: 20px 5px; padding: 5px 20px ; font-size: 25px; border-radius: 5px; display: none;">Restart</button>
            </div>
            <div id="status">
                <h1>Game is over</h1>
            </div>
        </div>
    </div>
    <script src="index.js"> </script>
</body>

</html>
